{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md">
        <!-- Logo e Título -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-xl mx-auto flex items-center justify-center mb-4">
                <span class="text-white text-2xl font-bold">NE</span>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">NE8000 Network Monitor</h2>
            <p class="text-gray-600 mt-2">Faça login para acessar o sistema</p>
        </div>

        <!-- Mensagens de Erro -->
        {% if error %}
        <div class="mb-4 p-4 rounded-lg bg-red-50 text-red-700 border border-red-200">
            {{ error }}
        </div>
        {% endif %}

        <!-- Formulário de Login -->
        <form method="POST" action="/login" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                <input type="text" 
                       name="username" 
                       id="username" 
                       required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                       placeholder="Digite seu usuário">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" 
                       name="password" 
                       id="password" 
                       required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                       placeholder="Digite sua senha">
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors">
                Entrar
            </button>
        </form>

        <!-- Informação de Segurança (SEM mostrar credenciais!) -->
        <div class="mt-6 text-center text-sm text-gray-500">
            <p>🔒 Sistema seguro</p>
            <p>Credenciais configuradas via variáveis de ambiente</p>
        </div>
    </div>
</div>

<script>
// Auto-focus no campo username
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('username').focus();
});
</script>
{% endblock %}
